<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LearnAgent — Build Progress</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #e5e5e5;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 28px 20px 60px;
    }

    .container { max-width: 900px; margin: 0 auto; }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 28px;
      gap: 16px;
    }
    .title { font-size: 20px; font-weight: 700; }
    .title span { color: #6366f1; }
    .subtitle { font-size: 12px; color: #555; margin-top: 3px; }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .reset-btn, .export-btn, .import-btn {
      background: transparent;
      border: 1px solid #2a2a2a;
      color: #555;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .reset-btn:hover { border-color: #444; color: #999; }
    .export-btn:hover { border-color: #6366f144; color: #818cf8; }
    .import-btn:hover { border-color: #22c55e44; color: #22c55e; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #e5e5e5;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 12px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { border-color: #22c55e44; color: #22c55e; }
    .toast.error   { border-color: #ef444444; color: #f87171; }

    /* ── Last saved ── */
    .saved-at { font-size: 10px; color: #2a2a2a; margin-top: 5px; }

    /* ── Overall Progress ── */
    .overall {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 12px;
      padding: 20px 22px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .overall-pct {
      font-size: 36px;
      font-weight: 700;
      color: #6366f1;
      white-space: nowrap;
      min-width: 72px;
    }
    .overall-right { flex: 1; }
    .overall-label { font-size: 11px; color: #555; margin-bottom: 8px; letter-spacing: 0.5px; text-transform: uppercase; }
    .bar-track {
      background: #1a1a1a;
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
      margin-bottom: 6px;
    }
    .bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #22c55e, #6366f1);
      transition: width 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    .overall-count { font-size: 12px; color: #444; }

    /* ── Phase Section ── */
    .phase {
      border: 1px solid #1e1e1e;
      border-radius: 12px;
      margin-bottom: 12px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .phase.current-phase { border-color: #6366f133; }
    .phase.done-phase { border-color: #22c55e22; }

    .phase-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      cursor: pointer;
      background: #0f0f0f;
      user-select: none;
      transition: background 0.15s;
    }
    .phase-header:hover { background: #141414; }

    .phase-icon { font-size: 15px; flex-shrink: 0; }

    .phase-title-wrap { flex: 1; min-width: 0; }
    .phase-name { font-size: 13px; font-weight: 600; }
    .phase-meta { font-size: 11px; color: #555; margin-top: 2px; }

    .phase-badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.8px;
      padding: 3px 7px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .badge-now { background: #1e1b4b; color: #818cf8; border: 1px solid #6366f133; }
    .badge-done { background: #0d2218; color: #22c55e; border: 1px solid #1a5c3633; }
    .badge-locked { background: #111; color: #444; border: 1px solid #222; }

    .phase-pct { font-size: 12px; font-weight: 600; color: #555; flex-shrink: 0; min-width: 36px; text-align: right; }
    .phase-pct.done { color: #22c55e; }
    .phase-pct.current { color: #6366f1; }

    .phase-bar { height: 3px; background: #1a1a1a; }
    .phase-bar-fill { height: 100%; background: linear-gradient(90deg, #22c55e, #6366f1); transition: width 0.35s; }

    .phase-body { display: none; background: #0a0a0a; }
    .phase-body.open { display: block; }

    /* ── Task Row ── */
    .task {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 18px 10px 18px;
      border-bottom: 1px solid #111;
      cursor: pointer;
      transition: background 0.1s;
    }
    .task:last-child { border-bottom: none; }
    .task:hover { background: #0f0f0f; }

    .task-check {
      width: 16px;
      height: 16px;
      border: 1.5px solid #333;
      border-radius: 4px;
      flex-shrink: 0;
      margin-top: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      font-size: 10px;
    }
    .task.done .task-check {
      background: #22c55e;
      border-color: #22c55e;
      color: white;
    }

    .task-content { flex: 1; min-width: 0; }
    .task-top { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 3px; }
    .task-id {
      font-size: 10px;
      font-family: monospace;
      font-weight: 700;
      color: #555;
      background: #161616;
      border: 1px solid #222;
      padding: 1px 5px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .task.done .task-id { color: #22c55e44; border-color: #1a5c3622; }

    .tag {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 1px 5px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .tag-parallel { background: #1a1230; color: #a78bfa; border: 1px solid #6366f122; }
    .tag-us1 { background: #0f1e2e; color: #38bdf8; border: 1px solid #0ea5e922; }
    .tag-us2 { background: #1a1500; color: #fbbf24; border: 1px solid #f59e0b22; }
    .tag-us3 { background: #1a0f1a; color: #e879f9; border: 1px solid #d946ef22; }
    .tag-us4 { background: #0f1a1a; color: #34d399; border: 1px solid #10b98122; }
    .tag-us5 { background: #1a1000; color: #fb923c; border: 1px solid #f9731622; }
    .tag-us6 { background: #1a0a0a; color: #f87171; border: 1px solid #ef444422; }

    /* ── MVP Gate ── */
    .mvp-gate {
      margin: 20px 0 12px;
      padding: 14px 18px;
      background: #0a1a0a;
      border: 1px solid #22c55e33;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .mvp-gate-icon { font-size: 18px; flex-shrink: 0; }
    .mvp-gate-body { flex: 1; }
    .mvp-gate-title { font-size: 12px; font-weight: 700; color: #22c55e; margin-bottom: 3px; }
    .mvp-gate-desc { font-size: 11px; color: #3a6a4a; line-height: 1.5; }

    .section-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #333;
      margin: 20px 0 8px;
      padding-left: 2px;
    }
    .section-label.mvp { color: #22c55e99; }
    .section-label.postmvp { color: #55555599; }

    .task-desc {
      font-size: 12px;
      color: #777;
      line-height: 1.5;
    }
    .task.done .task-desc { color: #3a3a3a; text-decoration: line-through; }

    .chevron {
      font-size: 11px;
      color: #333;
      flex-shrink: 0;
      margin-left: 4px;
      transition: transform 0.2s;
    }
    .phase-header.open .chevron { transform: rotate(90deg); }

    /* ── Speckit Pipeline ── */
    .speckit-section {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 12px;
      padding: 20px 22px;
      margin-bottom: 24px;
    }
    .speckit-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 18px;
    }
    .speckit-flow {
      display: flex;
      align-items: center;
      gap: 0;
      flex-wrap: wrap;
      row-gap: 10px;
    }
    .sk-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }
    .sk-node {
      font-size: 10px;
      font-weight: 700;
      font-family: monospace;
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid #222;
      background: #161616;
      color: #444;
      white-space: nowrap;
      cursor: default;
      transition: all 0.15s;
    }
    .sk-node.done  { background: #0d2218; border-color: #22c55e44; color: #22c55e; }
    .sk-node.active { background: #1e1b4b; border-color: #6366f144; color: #818cf8; box-shadow: 0 0 10px #6366f122; }
    .sk-label {
      font-size: 9px;
      color: #333;
      letter-spacing: 0.3px;
    }
    .sk-label.done   { color: #22c55e66; }
    .sk-label.active { color: #6366f188; }
    .sk-arrow {
      font-size: 14px;
      color: #222;
      padding: 0 4px;
      flex-shrink: 0;
      margin-bottom: 14px; /* align with node center */
    }
    .sk-arrow.done { color: #22c55e44; }

    /* ── Checkpoint Banner ── */
    .checkpoint {
      margin: 0 18px 10px;
      padding: 9px 12px;
      background: #0f1a2e;
      border: 1px solid #1e3a5f44;
      border-radius: 7px;
      font-size: 11px;
      color: #60a5fa;
      line-height: 1.5;
    }
    .checkpoint::before { content: "✦ Checkpoint: "; font-weight: 700; }

    /* ── Section divider inside phase body ── */
    .task-section-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #2a2a2a;
      padding: 10px 18px 4px;
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <div>
      <div class="title">LearnAgent <span>MVP</span></div>

    <div class="header-actions">
      <button class="import-btn" onclick="importProgress()">↑ Import</button>
      <button class="export-btn" onclick="exportProgress()">↓ Export</button>
      <button class="reset-btn" onclick="resetAll()">↺ Reset</button>
    </div>
  </div>
  <div class="saved-at" id="saved-at"></div>

  <div class="overall">
    <div class="overall-pct" id="overall-pct">0%</div>
    <div class="overall-right">
      <div class="overall-label">Overall Progress</div>
      <div class="bar-track"><div class="bar-fill" id="overall-fill" style="width:0%"></div></div>
      <div class="overall-count" id="overall-count">0 / 54 tasks complete</div>
    </div>
  </div>

  <!-- Speckit Pipeline -->
  <div class="speckit-section">

    <div class="speckit-flow" id="speckit-flow"></div>
  </div>

  <div id="phases"></div>

</div>
<div class="toast" id="toast"></div>

<script>
// MVP_PHASE_IDS: phases that must ship to test the idea
const MVP_PHASE_IDS = new Set(["p1", "p2", "p3"]);

const PHASES = [
  {
    id: "p1",
    name: "Phase 1 — Setup",
    meta: "Packages, env vars, Supadata client",

    tasks: [
      { id:"T001", parallel:false, story:null, desc:"Install packages via npm install: ai @ai-sdk/anthropic @ai-sdk/openai @ai-sdk/google @ai-sdk/groq @ai-sdk/mistral @openrouter/ai-sdk-provider recharts — verify all in package.json; confirm @anthropic-ai/sdk is NOT added (Vercel AI SDK wraps it)" },
      { id:"T002", parallel:false, story:null, desc:"Add env var placeholders to env.example: ANTHROPIC_API_KEY, SUPADATA_API_KEY, RAPIDAPI_KEY, ENCRYPTION_KEY (comment: '32-byte hex — generate with: openssl rand -hex 32')" },

  {

    name: "Phase 2 — Foundational",
    meta: "7 DB tables, URL validator, SSE emitter, model abstraction layer — blocks all user stories",

    checkpoint: "npm run db:push succeeds; 7 tables visible in Drizzle Studio (reports, report_sections, tasks, streaks, user_model_config, user_api_keys, report_cost_log); model abstraction layer complete; test row inserts into reports.",

      { id:"T007", parallel:false, story:null, desc:"Extend schema.ts: report_sections table (reportId FK, sectionType, contentJson jsonb; index on reportId)" },
      { id:"T008", parallel:false, story:null, desc:"Extend schema.ts: tasks table (reportId FK, userId text FK, label, scope today|week|month, completed bool, completedAt nullable; indexes on userId, reportId, completedAt)" },
      { id:"T009", parallel:false, story:null, desc:"Extend schema.ts: streaks table (userId UNIQUE text FK, currentStreak, longestStreak, lastActiveDate date, updatedAt)" },
      { id:"T010", parallel:false, story:null, desc:"Extend schema.ts: userModelConfig table (userId UNIQUE FK, primaryProvider, primaryModel, fallbackProvider, fallbackModel, dailyCostLimitUsd default 5.00, timeoutMs default 30000, timestamps)" },
      { id:"T011", parallel:false, story:null, desc:"Extend schema.ts: userApiKeys table (userId FK, provider, keyHash AES-256-GCM encrypted; UNIQUE on (userId, provider))" },

      { id:"T013", parallel:true,  story:null, desc:"Create src/lib/models/registry.ts — export PROVIDERS, MODEL_REGISTRY (anthropic/openai/google/groq/mistral/openrouter models), COST_RATES per model, DEFAULT_PRIMARY = { provider: 'anthropic', model: 'claude-sonnet-4-6' }" },
      { id:"T014", parallel:true,  story:null, desc:"Create src/lib/models/call.ts — export generateWithFallback(primary, fallback, config, prompt, maxTokens): checks daily cost limit → calls primary via generateText → on timeout/API error falls back → inserts into reportCostLog → returns { text, usedFallback }" },

  },
  {
    id: "p3",
    name: "Phase 3 — User Story 1",
    meta: "YouTube URL + project context → action plan in <90s (MVP)",

    tasks: [
      { id:"T017", parallel:true,  story:"US1", desc:"Create src/agents/fetcher.ts — runFetcher(videoUrl) → FetcherOutput; calls fetchTranscript via extractVideoId; no AI call; throws transcript_unavailable" },
      { id:"T018", parallel:true,  story:"US1", desc:"Create src/agents/analyst.ts — runAnalyst(fetcherOutput, modelConfig) → AnalystOutput; calls generateWithFallback with agentName:'analyst'; validates all contract fields; returns { ...parsed, usedFallback }" },

      { id:"T023", parallel:false, story:"US1", desc:"Create src/app/api/analyze/[id]/stream/route.ts — SSE GET; auth + userId ownership check; if status=complete emit done immediately; otherwise subscribe to emitter; pass through warning events; close on done/error" },

      { id:"T028", parallel:true,  story:"US1", desc:"Create src/components/report/ExamplesTab.tsx — shadcn Card with bulleted list of real examples from the video" },

  {
    id: "p4",
    name: "Phase 4 — User Story 2",
    meta: "Task completion + learning streak (Post-MVP)",
    icon: "🔥",
    checkpoint: "Task completion persists across sessions; streak counter in header updates live on toggle.",
    tasks: [
      { id:"T033", parallel:false, story:"US2", desc:"Create src/app/api/tasks/[id]/route.ts — PATCH toggle completed; set completedAt; streak upsert algorithm (today=no change, yesterday=increment, older=reset to 1); return streak in response" },
      { id:"T034", parallel:false, story:"US2", desc:"Create src/app/api/streak/route.ts — GET current user streak; return { currentStreak:0, longestStreak:0, lastActiveDate:null } if no row" },
      { id:"T035", parallel:false, story:"US2", desc:"Update ActionPlanTab.tsx — wire checkboxes to PATCH /api/tasks/[id]; strikethrough on complete; onTaskToggle(taskId, newStreak) prop" },
      { id:"T036", parallel:false, story:"US2", desc:"Update report/[id]/page.tsx — client wrapper; streakCount state from GET /api/streak; pass onTaskToggle to ActionPlanTab" },
      { id:"T037", parallel:false, story:"US2", desc:"Create src/contexts/StreakContext.tsx — provider + 🔥 N header display in (app)/layout.tsx; fetches initial value on mount; updates from onTaskToggle" },
    ]
  },
  {
    id: "p5",
    name: "Phase 5 — User Story 3",
    meta: "Share reports + export action plan (Post-MVP)",
    icon: "🔗",
    checkpoint: "Share link works unauthenticated; 404 when disabled; Markdown copy is valid.",
    tasks: [
      { id:"T038", parallel:true,  story:"US3", desc:"Create src/app/api/reports/[id]/share/route.ts — POST toggle isShared boolean; auth + userId guard; return { id, isShared }" },
      { id:"T039", parallel:true,  story:"US3", desc:"Create src/app/share/[id]/page.tsx — no auth; isShared=true guard (only bypass of userId filter); OG meta tags; read-only render of all 5 sections; no internal terms" },
      { id:"T040", parallel:false, story:"US3", desc:"Update report/[id]/page.tsx — Share/Disable buttons calling POST /api/reports/[id]/share; Copy as Markdown from actions.markdown" },
    ]
  },
  {
    id: "p6",
    name: "Phase 6 — User Story 4",
    meta: "Searchable report library (Post-MVP)",
    icon: "📚",
    checkpoint: "Library shows real reports most-recent-first; search filters without reload; empty state correct.",
    tasks: [

const TOTAL = PHASES.reduce((s, p) => s + p.tasks.length, 0);
const STORAGE_KEY = "learnagent-tasks-progress";
let openPhases = {};

function saveState(s) {
  const payload = { tasks: s, savedAt: new Date().toISOString() };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
  updateSavedAt(payload.savedAt);
}

function loadState() {
  try {
    const raw = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (!raw) return {};
    // support both old format (flat object) and new format ({ tasks, savedAt })
    if (raw.tasks) { updateSavedAt(raw.savedAt); return raw.tasks; }
    return raw; // legacy flat format
  } catch { return {}; }
}

function updateSavedAt(iso) {
  const el = document.getElementById("saved-at");
  if (!el || !iso) return;
  const d = new Date(iso);
  el.textContent = "Last saved " + d.toLocaleDateString() + " " + d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}

let toastTimer = null;
function showToast(msg, type = "") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show " + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = "toast"; }, 2800);
}

function exportProgress() {
  const raw = localStorage.getItem(STORAGE_KEY);
  const payload = raw ? JSON.parse(raw) : {};
  const tasks = payload.tasks || payload; // handle legacy
  const doneCount = Object.values(tasks).filter(Boolean).length;
  const out = {
    version: 1,
    project: "002-learnagent-pipeline-build",
    exportedAt: new Date().toISOString(),
    completedCount: doneCount,
    total: TOTAL,
    tasks
  };
  const blob = new Blob([JSON.stringify(out, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "learnagent-progress-" + new Date().toISOString().slice(0,10) + ".json";
  a.click();
  URL.revokeObjectURL(url);
  showToast("Progress exported (" + doneCount + "/" + TOTAL + " tasks)", "success");
}

function importProgress() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".json,application/json";
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const parsed = JSON.parse(ev.target.result);
        // accept both export format and raw flat task object
        const tasks = parsed.tasks || parsed;
        // validate: all keys should look like T0xx
        const keys = Object.keys(tasks);
        const valid = keys.length === 0 || keys.every(k => /^T\d+$/.test(k));
        if (!valid) { showToast("Invalid file format", "error"); return; }
        saveState(tasks);
        render();
        showToast("Imported " + keys.filter(k => tasks[k]).length + "/" + TOTAL + " tasks", "success");
      } catch { showToast("Could not read file", "error"); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function toggle(id) {
  const s = loadState();
  s[id] = !s[id];
  saveState(s);
  render();
}

function resetAll() {
  if (confirm("Reset all task progress?")) { localStorage.removeItem(STORAGE_KEY); render(); }
}

function togglePhase(phaseId) {
  openPhases[phaseId] = !openPhases[phaseId];
  render();
}

function storyTag(story) {
  if (!story) return "";
  const cls = "tag tag-" + story.toLowerCase();
  return `<span class="${cls}">${story}</span>`;
}

function render() {
  const state = loadState();

  // Overall
  const doneTotal = Object.values(state).filter(Boolean).length;
  const pct = Math.round((doneTotal / TOTAL) * 100);
  document.getElementById("overall-pct").textContent = pct + "%";
  document.getElementById("overall-fill").style.width = pct + "%";
  document.getElementById("overall-count").textContent = doneTotal + " / " + TOTAL + " tasks complete";

  // Determine current phase (first with incomplete tasks)
  let currentPhaseId = null;
  for (const phase of PHASES) {
    const phaseDone = phase.tasks.filter(t => state[t.id]).length;
    if (phaseDone < phase.tasks.length) { currentPhaseId = phase.id; break; }
  }

  const container = document.getElementById("phases");
  container.innerHTML = "";

  container.insertAdjacentHTML("beforeend", `<div class="section-label mvp">▸ MVP Core — test the idea</div>`);

  PHASES.forEach((phase, idx) => {
    // Inject gate + post-MVP label after Phase 3
    if (idx === 3) {
      const p3 = PHASES[2];
      const p3Done = p3.tasks.filter(t => state[t.id]).length;
      const p3Complete = p3Done === p3.tasks.length;
      container.insertAdjacentHTML("beforeend", `
        <div class="mvp-gate">
          <div class="mvp-gate-icon">${p3Complete ? "✅" : "🚦"}</div>
          <div class="mvp-gate-body">
            <div class="mvp-gate-title">${p3Complete ? "MVP VALIDATED — continue to post-MVP" : "VALIDATION GATE — complete Phase 3 first"}</div>
            <div class="mvp-gate-desc">Test the idea: a real YouTube URL + project description → specific, non-generic action plan in &lt;90s. If it works, continue. If not, fix prompts before building anything else.</div>
          </div>
        </div>
        <div class="section-label postmvp">▸ Post-MVP — only after core is validated</div>
      `);
    }

    const phaseDone = phase.tasks.filter(t => state[t.id]).length;
    const phaseTotal = phase.tasks.length;
    const phasePct = Math.round((phaseDone / phaseTotal) * 100);
    const isAllDone = phaseDone === phaseTotal;
    const isCurrent = phase.id === currentPhaseId;

    if (!(phase.id in openPhases)) openPhases[phase.id] = isCurrent;
    const isOpen = openPhases[phase.id];

    const phaseClass = isAllDone ? "phase done-phase" : isCurrent ? "phase current-phase" : "phase";
    const badge = isAllDone
      ? `<span class="phase-badge badge-done">DONE</span>`
      : isCurrent
        ? `<span class="phase-badge badge-now">NOW</span>`
        : `<span class="phase-badge badge-locked">${phaseDone}/${phaseTotal}</span>`;
    const pctClass = isAllDone ? "phase-pct done" : isCurrent ? "phase-pct current" : "phase-pct";
    const pctText = isAllDone ? "100%" : phasePct + "%";

    const tasksHtml = phase.tasks.map(t => {
      const done = !!state[t.id];
      return `
        <div class="task ${done ? 'done' : ''}" onclick="toggle('${t.id}')">
          <div class="task-check">${done ? "✓" : ""}</div>
          <div class="task-content">
            <div class="task-top">
              <span class="task-id">${t.id}</span>
              ${t.parallel ? '<span class="tag tag-parallel">PARALLEL</span>' : ""}
              ${storyTag(t.story)}
            </div>
            <div class="task-desc">${t.desc}</div>
          </div>
        </div>`;
    }).join("");

    const mvpBadge = MVP_PHASE_IDS.has(phase.id) && !isAllDone
      ? `<span class="phase-badge" style="background:#0a1a0a;color:#22c55e99;border:1px solid #22c55e22;font-size:9px;font-weight:700;letter-spacing:.8px;padding:3px 7px;border-radius:4px;flex-shrink:0;">MVP</span>`
      : "";

    const html = `
      <div class="${phaseClass}" id="phase-${phase.id}">
        <div class="phase-header ${isOpen ? 'open' : ''}" id="hdr-${phase.id}" onclick="togglePhase('${phase.id}')">
          <span class="phase-icon">${phase.icon}</span>
          <div class="phase-title-wrap">
            <div class="phase-name">${phase.name}</div>
            <div class="phase-meta">${phase.meta}</div>
          </div>
          ${mvpBadge}
          ${badge}
          <span class="${pctClass}">${pctText}</span>
          <span class="chevron" id="chev-${phase.id}">${isOpen ? "▾" : "▸"}</span>
        </div>
        <div class="phase-bar"><div class="phase-bar-fill" style="width:${phasePct}%"></div></div>
        <div class="phase-body ${isOpen ? 'open' : ''}" id="body-${phase.id}">
          ${tasksHtml}
          <div class="checkpoint">${phase.checkpoint}</div>
        </div>
      </div>`;

    container.insertAdjacentHTML("beforeend", html);
  });
}

// ── Speckit pipeline definition ──────────────────────────────────────
const SPECKIT_STEPS = [
  { cmd: "specify",      label: "spec.md",           done: true  },
  { cmd: "clarify",      label: "10 Q&A locked",     done: true  },
  { cmd: "plan",         label: "plan.md + contracts",done: true  },
  { cmd: "analyze",      label: "cross-artifact QA", done: true  },
  { cmd: "tasks",        label: "tasks.md (T001–T054)", done: true },
  { cmd: "implement",    label: "code",               done: false, active: true },
];

function renderSpeckit() {
  const flow = document.getElementById("speckit-flow");
  if (!flow) return;
  let html = "";
  SPECKIT_STEPS.forEach((step, i) => {
    const cls = step.done ? "done" : step.active ? "active" : "";
    const arrowCls = i > 0 && SPECKIT_STEPS[i-1].done ? "done" : "";
    if (i > 0) html += `<span class="sk-arrow ${arrowCls}">→</span>`;
    html += `
      <div class="sk-step">
        <div class="sk-node ${cls}">/speckit.${step.cmd}</div>
        <div class="sk-label ${cls}">${step.label}</div>
      </div>`;
  });
  flow.innerHTML = html;
}

render();
renderSpeckit();
</script>
